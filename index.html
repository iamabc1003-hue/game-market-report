<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Market Reports</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #5d6875;
      --line: #d9dee5;
      --paper: #f7f8fa;
      --panel: #ffffff;
      --accent: #0a6f68;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      max-width: 720px;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.05rem;
    }
    section {
      margin-top: 48px;
      border-top: 1px solid var(--line);
      padding-top: 28px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }
    .empty {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
      border-radius: 8px;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Game Market Reports</h1>
    <p>Monthly game market intelligence for studio leadership. Reports are generated as standalone HTML pages and published here for easy sharing.</p>
    <section>
      <h2>Reports</h2>
      <div class="empty">The first monthly report will appear here after the scheduled automation runs.</div>
    </section>
  </main>
</body>
</html>
