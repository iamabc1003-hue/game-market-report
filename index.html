<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game Market Reports</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #5d6875;
      --line: #d9dee5;
      --paper: #f7f8fa;
      --panel: #ffffff;
      --accent: #0a6f68;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 72px 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p {
      max-width: 720px;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.05rem;
    }
    section {
      margin-top: 48px;
      border-top: 1px solid var(--line);
      padding-top: 28px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }
    .report-list { display: grid; gap: 12px; padding: 0; margin: 0; list-style: none; }
    .report-list a {
      display: block;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 18px 20px;
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
    }
    .report-list strong { display: block; font-size: 1.1rem; margin-bottom: 4px; }
    .report-list span { color: var(--muted); }
    .meta { margin-top: 34px; font-size: .92rem; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Game Market Reports</h1>
    <p>Monthly game market intelligence for studio leadership. Reports are generated as standalone HTML pages and published here for easy sharing.</p>

    <section>
      <h2>Reports</h2>
      <ul class="report-list">
        <li>
          <a href="reports/2026-03/">
            <strong>2026년 3월 게임시장 동향 리포트</strong>
            <span>모바일 라이브 서비스, 저사양 슈터, Steam/PC 신작, AI와 조직 리스크</span>
          </a>
        </li>
      </ul>
    </section>

    <p class="meta">Next scheduled report: 2026년 5월 10일, covering 2026년 4월.</p>
  </main>
</body>
</html>
